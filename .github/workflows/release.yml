name: Release

# Builds all self-contained single-file binaries, generates SHA256SUMS,
# attaches GitHub build-provenance attestations, and publishes a Release.
#
# Trigger by pushing a version tag:   git tag v1.2.3 && git push origin v1.2.3
# Or run manually from the Actions tab (workflow_dispatch).

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write       # create the GitHub Release + upload assets
  id-token: write       # required by attest-build-provenance
  attestations: write   # required by attest-build-provenance

jobs:
  release:
    runs-on: ubuntu-latest

    # GPG signing is optional: it only runs if the GPG_PRIVATE_KEY secret is set.
    # Without the secret the workflow still produces unsigned binaries + checksums.
    env:
      GPG_PRIVATE_KEY: ${{ secrets.GPG_PRIVATE_KEY }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish all platforms
        run: |
          set -euo pipefail
          mkdir -p dist

          # RID  ->  output file name (matches publish.bat naming)
          publish() {
            local rid="$1" out="$2" host="$3"
            echo "::group::publish $rid"
            dotnet publish LlamaServerLauncher.csproj \
              -c Release -r "$rid" -o "publish/$rid" \
              --self-contained true /p:PublishSingleFile=true
            mv "publish/$rid/$host" "dist/$out"
            echo "::endgroup::"
          }

          publish win-x64    LlamaServerLauncher_win_x64.exe   LlamaServerLauncher.exe
          publish linux-x64  LlamaServerLauncher_linux_x64     LlamaServerLauncher
          publish osx-x64    LlamaServerLauncher_osx_x64       LlamaServerLauncher
          publish osx-arm64  LlamaServerLauncher_osx_arm64     LlamaServerLauncher

          ls -la dist

      - name: Generate SHA256SUMS
        working-directory: dist
        run: sha256sum * > SHA256SUMS

      - name: GPG sign checksums (optional)
        if: env.GPG_PRIVATE_KEY != ''
        working-directory: dist
        run: |
          set -euo pipefail
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          KEYID=$(gpg --list-secret-keys --with-colons | awk -F: '/^sec:/ {print $5; exit}')
          gpg --batch --yes --pinentry-mode loopback \
            ${GPG_PASSPHRASE:+--passphrase "$GPG_PASSPHRASE"} \
            --local-user "$KEYID" \
            --armor --detach-sign --output SHA256SUMS.asc SHA256SUMS
          gpg --armor --export "$KEYID" > LlamaServerLauncherAvalonia-public.asc

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: |
            dist/LlamaServerLauncher_win_x64.exe
            dist/LlamaServerLauncher_linux_x64
            dist/LlamaServerLauncher_osx_x64
            dist/LlamaServerLauncher_osx_arm64

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            --draft

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: dist/*
